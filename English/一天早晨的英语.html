<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一天早晨的英语 · 发音练习</title>
  <style>
    :root {
      --bg-1: #f7f9fc;
      --bg-2: #eef4fb;
      --card: rgba(255, 255, 255, 0.8);
      --border: rgba(120, 138, 163, 0.16);
      --text: #223046;
      --text-soft: #5e6b7f;
      --text-faint: #7f8ca0;
      --accent: #7b9cff;
      --shadow: 0 10px 30px rgba(41, 60, 98, 0.07);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(187, 215, 255, 0.45), transparent 34%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 42%, #fbfcfe 100%);
    }

    body {
      padding: 24px;
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
    }

    .hero {
      padding: 8px 4px 20px;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid var(--border);
      color: var(--text-soft);
      font-size: 13px;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0;
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.8;
      max-width: 760px;
    }

    .panel,
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .panel {
      padding: 18px;
      margin-bottom: 20px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.1fr 1fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 16px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label,
    .group-label {
      font-size: 13px;
      color: var(--text-soft);
    }

    select,
    .search-input {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.85);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      outline: none;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .range-value {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-soft);
      min-width: 42px;
      text-align: right;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
    }

    .actions-left,
    .actions-right {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .btn {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
      border-radius: 14px;
      padding: 11px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn.primary {
      border-color: rgba(123, 156, 255, 0.3);
      background: rgba(245, 248, 255, 0.95);
    }

    .pill {
      padding: 10px 12px;
      border-radius: 999px;
      font-size: 13px;
      color: var(--text-soft);
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid var(--border);
    }

    .table-wrap {
      padding: 12px;
      overflow: hidden;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 8px 8px 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 20px;
    }

    .section-title p {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--text-faint);
    }

    .meta-chip {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--text-soft);
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    .table-scroll {
      overflow: auto;
      border-radius: 18px;
      border: 1px solid rgba(120, 138, 163, 0.12);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
      background: rgba(255, 255, 255, 0.4);
    }

    thead th {
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-soft);
      background: rgba(247, 250, 255, 0.95);
      border-bottom: 1px solid rgba(120, 138, 163, 0.14);
      padding: 16px 14px;
      position: sticky;
      top: 0;
    }

    tbody td {
      padding: 14px;
      border-bottom: 1px solid rgba(120, 138, 163, 0.1);
      font-size: 14px;
      vertical-align: middle;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.55);
    }

    .num {
      color: var(--text-faint);
      width: 56px;
      font-family: var(--mono);
    }

    .phrase-en {
      font-weight: 600;
    }

    .phrase-cn {
      color: var(--text-soft);
    }

    .ipa {
      font-family: var(--mono);
      color: #4d6186;
      font-size: 13px;
      line-height: 1.55;
    }

    .speak-btn {
      width: 42px;
      height: 42px;
      display: inline-grid;
      place-items: center;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.9);
      cursor: pointer;
    }

    .speak-btn svg {
      width: 18px;
      height: 18px;
      fill: #4663a0;
    }

    .empty-state {
      padding: 28px 16px;
      text-align: center;
      color: var(--text-soft);
    }

    .is-hidden {
      display: none !important;
    }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      color: var(--text-faint);
      font-size: 12px;
    }

    @media (max-width: 820px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column;
        align-items: stretch;
      }

      .actions-left,
      .actions-right {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div class="eyebrow">英语短语 · 发音练习 · 早晨场景</div>
      <h1>一天早晨的英语</h1>
      <p class="subtitle">
        一个简洁的发音练习页。点击单条短语即可朗读，也可以连续播放、随机抽查和搜索记忆。
      </p>
    </header>

    <section class="panel">
      <div class="controls">
        <div class="field">
          <label for="voiceSelect">口音 / 声音</label>
          <select id="voiceSelect"></select>
        </div>

        <div class="field">
          <label for="searchInput">搜索短语</label>
          <input id="searchInput" class="search-input" type="text" placeholder="例如：coffee / bed / work" />
        </div>

        <div class="field">
          <div class="group-label">语速</div>
          <div class="range-row">
            <input id="rateRange" type="range" min="0.7" max="1.2" step="0.05" value="0.95" />
            <div id="rateValue" class="range-value">0.95</div>
          </div>
        </div>

        <div class="field">
          <div class="group-label">音高</div>
          <div class="range-row">
            <input id="pitchRange" type="range" min="0.8" max="1.2" step="0.05" value="1.00" />
            <div id="pitchValue" class="range-value">1.00</div>
          </div>
        </div>
      </div>

      <div class="actions">
        <div class="actions-left">
          <button class="btn primary" id="playAllBtn">朗读全部</button>
          <button class="btn" id="stopBtn">停止</button>
          <button class="btn" id="shuffleBtn">随机一句</button>
          <button class="btn" id="resetBtn">重置</button>
        </div>

        <div class="actions-right">
          <div class="pill" id="voiceSupportStatus">检测语音中...</div>
          <div class="pill" id="listCount">共 29 条</div>
        </div>
      </div>
    </section>

    <section class="table-wrap">
      <div class="section-title">
        <div>
          <h2>短语列表</h2>
          <p>点击右侧按钮即可发音。</p>
        </div>
        <div class="meta-chip">保存为 .html 后可直接打开</div>
      </div>

      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th style="width: 64px;">序号</th>
              <th>英文短语</th>
              <th>中文提示</th>
              <th>记忆拆分</th>
              <th style="width: 88px;">朗读</th>
            </tr>
          </thead>
          <tbody id="phraseTableBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state is-hidden">没有匹配结果，请换个关键词。</div>
      </div>
    </section>

    <div class="footer-note">基于浏览器内置 SpeechSynthesis API</div>
  </div>

  <script>
    const phrases = [
      { en: 'alarm clock goes off', cn: '闹钟响了', ipa: 'alarm / clock / goes / off' },
      { en: 'push snooze', cn: '按下贪睡 / 稍后提醒', ipa: 'push / snooze' },
      { en: 'check my phone', cn: '查看手机', ipa: 'check / my / phone' },
      { en: 'scroll through social media', cn: '刷社交媒体', ipa: 'scroll through / social media' },
      { en: 'get out of bed', cn: '起床，下床', ipa: 'get / out of / bed' },
      { en: 'open the curtains', cn: '拉开窗帘', ipa: 'open / the curtains' },
      { en: 'rinse my mouth', cn: '漱口', ipa: 'rinse / my / mouth' },
      { en: 'shampoo my hair', cn: '洗头发', ipa: 'shampoo / my / hair' },
      { en: 'dry off', cn: '擦干身体 / 擦干', ipa: 'dry / off' },
      { en: 'comb my hair', cn: '梳头', ipa: 'comb / my / hair' },
      { en: 'put on some lotion', cn: '涂一点乳液', ipa: 'put on / some lotion' },
      { en: 'put in my contacts', cn: '戴隐形眼镜', ipa: 'put in / my contacts' },
      { en: 'put on make-up', cn: '化妆', ipa: 'put on / make-up' },
      { en: 'slap some aftershave', cn: '抹点须后水', ipa: 'slap / some aftershave' },
      { en: 'go downstairs', cn: '下楼', ipa: 'go / downstairs' },
      { en: 'heat up some water', cn: '把水热一下', ipa: 'heat up / some water' },
      { en: 'brew the coffee', cn: '煮咖啡 / 冲咖啡', ipa: 'brew / the coffee' },
      { en: 'pour the water', cn: '倒水', ipa: 'pour / the water' },
      { en: 'make the breakfast', cn: '做早餐', ipa: 'make / the breakfast' },
      { en: 'pick up my clothes', cn: '拿起 / 收拾我的衣服', ipa: 'pick up / my clothes' },
      { en: 'get dressed', cn: '穿好衣服', ipa: 'get dressed' },
      { en: 'walk my dog', cn: '遛狗', ipa: 'walk / my dog' },
      { en: 'hit the gym', cn: '去健身房', ipa: 'hit / the gym' },
      { en: 'work from home', cn: '居家办公', ipa: 'work / from home' },
      { en: 'head to work', cn: '去上班', ipa: 'head to / work' },
      { en: 'doze off', cn: '打瞌睡', ipa: 'doze off' },
      { en: 'work on the computer', cn: '在电脑上工作', ipa: 'work on / the computer' },
      { en: 'answer my emails', cn: '回复邮件', ipa: 'answer / my emails' },
      { en: 'attend a meeting', cn: '参加会议', ipa: 'attend / a meeting' }
    ].map((item, index) => ({ ...item, id: index + 1 }));

    const voiceSelect = document.getElementById('voiceSelect');
    const searchInput = document.getElementById('searchInput');
    const rateRange = document.getElementById('rateRange');
    const pitchRange = document.getElementById('pitchRange');
    const rateValue = document.getElementById('rateValue');
    const pitchValue = document.getElementById('pitchValue');
    const playAllBtn = document.getElementById('playAllBtn');
    const stopBtn = document.getElementById('stopBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const resetBtn = document.getElementById('resetBtn');
    const phraseTableBody = document.getElementById('phraseTableBody');
    const voiceSupportStatus = document.getElementById('voiceSupportStatus');
    const listCount = document.getElementById('listCount');
    const emptyState = document.getElementById('emptyState');

    let filteredPhrases = [...phrases];
    let playQueueIndex = 0;
    let isPlayingAll = false;

    const speakerIcon = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 10v4a1 1 0 0 0 1 1h3l4 3a1 1 0 0 0 1.6-.8V6.8A1 1 0 0 0 11 6l-4 3H4a1 1 0 0 0-1 1Zm13.5 2a3.5 3.5 0 0 0-2.03-3.18v6.36A3.5 3.5 0 0 0 16.5 12Zm-2.03-8.02v2.16a6.5 6.5 0 0 1 0 11.72v2.16a8.5 8.5 0 0 0 0-16.04Z"/>
      </svg>`;

    function formatIndex(num) {
      return String(num).padStart(2, '0');
    }

    function populateVoices() {
      if (!('speechSynthesis' in window)) {
        voiceSelect.innerHTML = '<option>不支持 SpeechSynthesis</option>';
        voiceSupportStatus.textContent = '当前浏览器不支持朗读';
        return;
      }

      const allVoices = window.speechSynthesis.getVoices();
      const englishVoices = allVoices.filter(v => /en-/i.test(v.lang) || /english/i.test(v.name));
      const useVoices = englishVoices.length ? englishVoices : allVoices;

      voiceSelect.innerHTML = '';

      if (!useVoices.length) {
        voiceSelect.innerHTML = '<option>未检测到可用语音</option>';
        voiceSupportStatus.textContent = '未检测到可用语音';
        return;
      }

      useVoices.forEach((voice, index) => {
        const option = document.createElement('option');
        option.value = voice.name;
        option.textContent = `${voice.name} · ${voice.lang}${voice.default ? ' · 默认' : ''}`;
        if (index === 0) option.selected = true;
        voiceSelect.appendChild(option);
      });

      voiceSupportStatus.textContent = `可用语音 ${useVoices.length} 个`;
    }

    function getSelectedVoice() {
      if (!('speechSynthesis' in window)) return null;
      const name = voiceSelect.value;
      return window.speechSynthesis.getVoices().find(v => v.name === name) || null;
    }

    function speakText(text, callback) {
      if (!('speechSynthesis' in window)) return;

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      const voice = getSelectedVoice();

      if (voice) utterance.voice = voice;
      utterance.lang = voice?.lang || 'en-US';
      utterance.rate = Number(rateRange.value);
      utterance.pitch = Number(pitchRange.value);

      utterance.onend = () => {
        if (typeof callback === 'function') callback();
      };

      utterance.onerror = () => {
        if (typeof callback === 'function') callback();
      };

      window.speechSynthesis.speak(utterance);
    }

    function speakPhrase(item) {
      if (!item) return;
      speakText(item.en);
    }

    function playAllSequentially() {
      if (!filteredPhrases.length) return;

      const item = filteredPhrases[playQueueIndex];
      if (!item) {
        isPlayingAll = false;
        playQueueIndex = 0;
        return;
      }

      speakText(item.en, () => {
        if (!isPlayingAll) return;
        playQueueIndex += 1;
        if (playQueueIndex < filteredPhrases.length) {
          setTimeout(playAllSequentially, 250);
        } else {
          isPlayingAll = false;
          playQueueIndex = 0;
        }
      });
    }

    function stopSpeaking() {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
      isPlayingAll = false;
      playQueueIndex = 0;
    }

    function renderTable() {
      phraseTableBody.innerHTML = '';

      if (!filteredPhrases.length) {
        emptyState.classList.remove('is-hidden');
      } else {
        emptyState.classList.add('is-hidden');
      }

      filteredPhrases.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="num">${formatIndex(item.id)}</td>
          <td><div class="phrase-en">${item.en}</div></td>
          <td><div class="phrase-cn">${item.cn}</div></td>
          <td><div class="ipa">${item.ipa}</div></td>
          <td>
            <button class="speak-btn" title="朗读：${item.en}" aria-label="朗读 ${item.en}">
              ${speakerIcon}
            </button>
          </td>
        `;

        tr.querySelector('.speak-btn').addEventListener('click', (event) => {
          event.stopPropagation();
          stopSpeaking();
          speakPhrase(item);
        });

        phraseTableBody.appendChild(tr);
      });

      listCount.textContent = `共 ${filteredPhrases.length} 条`;
    }

    function applyFilter() {
      const keyword = searchInput.value.trim().toLowerCase();
      filteredPhrases = phrases.filter(item => {
        return `${item.en} ${item.cn} ${item.ipa}`.toLowerCase().includes(keyword);
      });
      renderTable();
    }

    rateRange.addEventListener('input', () => {
      rateValue.textContent = Number(rateRange.value).toFixed(2);
    });

    pitchRange.addEventListener('input', () => {
      pitchValue.textContent = Number(pitchRange.value).toFixed(2);
    });

    searchInput.addEventListener('input', applyFilter);

    playAllBtn.addEventListener('click', () => {
      if (!filteredPhrases.length) return;
      stopSpeaking();
      isPlayingAll = true;
      playQueueIndex = 0;
      playAllSequentially();
    });

    stopBtn.addEventListener('click', stopSpeaking);

    shuffleBtn.addEventListener('click', () => {
      if (!filteredPhrases.length) return;
      stopSpeaking();
      const randomIndex = Math.floor(Math.random() * filteredPhrases.length);
      speakPhrase(filteredPhrases[randomIndex]);
    });

    resetBtn.addEventListener('click', () => {
      stopSpeaking();
      searchInput.value = '';
      rateRange.value = '0.95';
      pitchRange.value = '1.00';
      rateValue.textContent = '0.95';
      pitchValue.textContent = '1.00';
      filteredPhrases = [...phrases];
      renderTable();
    });

    document.addEventListener('keydown', (event) => {
      if (event.target === searchInput) return;
      if (event.code === 'Space') {
        event.preventDefault();
        shuffleBtn.click();
      }
      if (event.key.toLowerCase() === 's') {
        stopBtn.click();
      }
    });

    populateVoices();
    if ('speechSynthesis' in window) {
      window.speechSynthesis.onvoiceschanged = populateVoices;
    }

    renderTable();
  </script>
</body>
</html>
