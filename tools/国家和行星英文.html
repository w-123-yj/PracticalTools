<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>行星与国家英文读音（IPA + 朗读）</title>
  <style>
    :root{
      --bg:#0b1020; --card:#111a33; --text:#e8ecff; --muted:#a9b2d6;
      --line:#22305e; --btn:#1c2b57; --btn2:#2a3d7a; --warn:#ffcc66;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:linear-gradient(180deg,var(--bg),#070a14);
      color:var(--text);
    }
    header{
      padding:18px 16px 10px;
      max-width:1100px; margin:0 auto;
    }
    h1{font-size:18px; margin:0 0 8px}
    .sub{color:var(--muted); font-size:13px; line-height:1.5}
    .wrap{max-width:1100px; margin:0 auto; padding:12px 16px 28px;}
    .panel{
      background:rgba(17,26,51,.9);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      margin:12px 0 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .controls{
      display:flex; flex-wrap:wrap; gap:10px; align-items:center;
      margin-top:10px;
    }
    label{font-size:13px; color:var(--muted)}
    select,input[type="range"]{
      background:#0d1430; color:var(--text);
      border:1px solid var(--line);
      border-radius:10px; padding:8px 10px;
    }
    input[type="range"]{padding:0; height:28px}
    .btn{
      background:var(--btn);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:10px;
      padding:9px 12px;
      cursor:pointer;
      transition:.15s transform,.15s background;
      font-size:13px;
    }
    .btn:hover{background:var(--btn2)}
    .btn:active{transform:scale(.98)}
    .badge{
      display:inline-flex; gap:6px; align-items:center;
      background:#0d1430; border:1px solid var(--line);
      color:var(--muted);
      padding:8px 10px; border-radius:10px; font-size:13px;
    }
    .warn{color:var(--warn)}
    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      overflow:hidden;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(13,20,48,.6);
    }
    thead th{
      text-align:left;
      font-weight:600;
      color:var(--text);
      font-size:13px;
      padding:10px 10px;
      background:rgba(28,43,87,.55);
      border-bottom:1px solid var(--line);
    }
    tbody td{
      padding:10px 10px;
      font-size:13px;
      border-bottom:1px solid rgba(34,48,94,.55);
      vertical-align:top;
    }
    tbody tr:last-child td{border-bottom:none}
    .muted{color:var(--muted)}
    .ipa{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}
    .speakcell{
      white-space:nowrap;
      width:1%;
    }
    .mini{
      padding:7px 10px;
      border-radius:10px;
      font-size:13px;
      line-height:1;
    }
    .status{
      margin-left:auto;
      display:flex; gap:8px; align-items:center;
      flex-wrap:wrap;
    }
    .k{color:var(--muted); font-size:12px}
    @media (max-width:720px){
      .status{margin-left:0}
      thead th:nth-child(4), tbody td:nth-child(4){display:none;} /* 小屏隐藏“朗读”列标题保留按钮列 */
    }
  </style>
</head>

<body>
  <header>
    <h1>太阳系八大行星 & 30个常见国家（中文名 / 英文名 / IPA / 朗读）</h1>
    <div class="sub">
      点击每行的 🔊 即可朗读英文名称。朗读基于浏览器 <span class="muted">Web Speech API</span>（无需外部音频）。<br/>
      注：不同设备/浏览器的可用声音与口音略有差异；若没有可用英文语音，请换 Chrome/Edge 或安装系统语音包。
    </div>
  </header>

  <div class="wrap">
    <div class="panel">
      <div class="controls">
        <label>口音/语言：
          <select id="lang">
            <option value="en-US" selected>英语（美国）en-US</option>
            <option value="en-GB">英语（英国）en-GB</option>
            <option value="en-AU">英语（澳大利亚）en-AU</option>
            <option value="en-CA">英语（加拿大）en-CA</option>
          </select>
        </label>

        <label>声音（Voice）：
          <select id="voice">
            <option value="">自动选择（推荐）</option>
          </select>
        </label>

        <label>语速：
          <input id="rate" type="range" min="0.6" max="1.2" step="0.05" value="0.95" />
          <span class="k" id="ratev">0.95</span>
        </label>

        <label>音高：
          <input id="pitch" type="range" min="0.8" max="1.2" step="0.05" value="1.0" />
          <span class="k" id="pitchv">1.00</span>
        </label>

        <button class="btn" id="stop">停止</button>

        <div class="status">
          <button class="btn" id="speakPlanets">朗读全部行星</button>
          <button class="btn" id="speakCountries">朗读全部国家</button>
          <span class="badge" id="apiStatus">API：检测中…</span>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2 style="margin:0 0 10px;font-size:15px;">太阳系八大行星</h2>
      <table>
        <thead>
          <tr>
            <th style="width:12%;">序号</th>
            <th style="width:20%;">中文名称</th>
            <th style="width:25%;">英文名称</th>
            <th>英文读音（IPA）</th>
            <th class="speakcell">朗读</th>
          </tr>
        </thead>
        <tbody id="planets"></tbody>
      </table>
    </div>

    <div class="panel">
      <h2 style="margin:0 0 10px;font-size:15px;">30个常见国家</h2>
      <table>
        <thead>
          <tr>
            <th style="width:12%;">序号</th>
            <th style="width:20%;">中文名称</th>
            <th style="width:25%;">英文名称</th>
            <th>英文读音（IPA）</th>
            <th class="speakcell">朗读</th>
          </tr>
        </thead>
        <tbody id="countries"></tbody>
      </table>
    </div>
  </div>

<script>
  const planetsData = [
    { zh:"水星", en:"Mercury", ipa:"/ˈmɜːrkjəri/" },
    { zh:"金星", en:"Venus", ipa:"/ˈviːnəs/" },
    { zh:"地球", en:"Earth", ipa:"/ɜːrθ/" },
    { zh:"火星", en:"Mars", ipa:"/mɑːrz/" },
    { zh:"木星", en:"Jupiter", ipa:"/ˈdʒuːpɪtər/" },
    { zh:"土星", en:"Saturn", ipa:"/ˈsætərn/" },
    { zh:"天王星", en:"Uranus", ipa:"/ˈjʊərənəs/ 或 /jʊˈreɪnəs/" },
    { zh:"海王星", en:"Neptune", ipa:"/ˈneptjuːn/（英式）或 /ˈneptuːn/（美式）" },
  ];

  const countriesData = [
    { zh:"中国", en:"China", ipa:"/ˈtʃaɪnə/" },
    { zh:"美国", en:"United States", ipa:"/juːˈnaɪtɪd steɪts/" },
    { zh:"英国", en:"United Kingdom", ipa:"/juːˈnaɪtɪd ˈkɪŋdəm/" },
    { zh:"法国", en:"France", ipa:"/fræns/" },
    { zh:"德国", en:"Germany", ipa:"/ˈdʒɜːrməni/" },
    { zh:"日本", en:"Japan", ipa:"/dʒəˈpæn/" },
    { zh:"韩国", en:"South Korea", ipa:"/saʊθ kəˈriːə/" },
    { zh:"俄罗斯", en:"Russia", ipa:"/ˈrʌʃə/" },
    { zh:"加拿大", en:"Canada", ipa:"/ˈkænədə/" },
    { zh:"澳大利亚", en:"Australia", ipa:"/ɔːˈstreɪliə/" },
    { zh:"印度", en:"India", ipa:"/ˈɪndiə/" },
    { zh:"巴西", en:"Brazil", ipa:"/brəˈzɪl/" },
    { zh:"墨西哥", en:"Mexico", ipa:"/ˈmɛksɪkoʊ/" },
    { zh:"意大利", en:"Italy", ipa:"/ˈɪtəli/" },
    { zh:"西班牙", en:"Spain", ipa:"/speɪn/" },
    { zh:"荷兰", en:"Netherlands", ipa:"/ˈneðərləndz/" },
    { zh:"瑞士", en:"Switzerland", ipa:"/ˈswɪtsərlənd/" },
    { zh:"瑞典", en:"Sweden", ipa:"/ˈswiːdən/" },
    { zh:"挪威", en:"Norway", ipa:"/ˈnɔːrweɪ/" },
    { zh:"芬兰", en:"Finland", ipa:"/ˈfɪnlənd/" },
    { zh:"新西兰", en:"New Zealand", ipa:"/nuː ˈziːlənd/" },
    { zh:"埃及", en:"Egypt", ipa:"/ˈiːdʒɪpt/" },
    { zh:"南非", en:"South Africa", ipa:"/saʊθ ˈæfrɪkə/" },
    { zh:"土耳其", en:"Turkey", ipa:"/ˈtɜːrki/" },
    { zh:"泰国", en:"Thailand", ipa:"/ˈtaɪlænd/" },
    { zh:"越南", en:"Vietnam", ipa:"/ˌviːɛtˈnæm/" },
    { zh:"印度尼西亚", en:"Indonesia", ipa:"/ˌɪndəˈniːʒə/" },
    { zh:"阿根廷", en:"Argentina", ipa:"/ˌɑːrdʒənˈtiːnə/" },
    { zh:"沙特阿拉伯", en:"Saudi Arabia", ipa:"/ˈsaʊdi əˈreɪbiə/" },
    { zh:"以色列", en:"Israel", ipa:"/ˈɪsreɪəl/" },
  ];

  const elPlanets = document.getElementById("planets");
  const elCountries = document.getElementById("countries");
  const langSel = document.getElementById("lang");
  const voiceSel = document.getElementById("voice");
  const rate = document.getElementById("rate");
  const pitch = document.getElementById("pitch");
  const ratev = document.getElementById("ratev");
  const pitchv = document.getElementById("pitchv");
  const apiStatus = document.getElementById("apiStatus");

  function rowHTML(i, item){
    const safeEn = item.en.replace(/"/g, "&quot;");
    return `
      <tr>
        <td class="muted">${i}</td>
        <td>${item.zh}</td>
        <td><span>${item.en}</span></td>
        <td class="ipa">${item.ipa}</td>
        <td class="speakcell">
          <button class="btn mini" data-speak="${safeEn}" title="朗读：${safeEn}">🔊</button>
        </td>
      </tr>
    `;
  }

  function render(){
    elPlanets.innerHTML = planetsData.map((x, idx)=>rowHTML(idx+1, x)).join("");
    elCountries.innerHTML = countriesData.map((x, idx)=>rowHTML(idx+1, x)).join("");
  }

  // --- Speech ---
  function hasSpeech(){
    return ("speechSynthesis" in window) && ("SpeechSynthesisUtterance" in window);
  }

  function updateAPIStatus(){
    if(!hasSpeech()){
      apiStatus.innerHTML = `API：<span class="warn">不可用</span>`;
      return;
    }
    apiStatus.textContent = "API：可用";
  }

  function listVoices(){
    if(!hasSpeech()) return;
    const voices = speechSynthesis.getVoices();
    const wantedLang = langSel.value;

    // reset
    voiceSel.innerHTML = `<option value="">自动选择（推荐）</option>`;

    // populate: prioritize exact lang match
    const matched = voices
      .filter(v => (v.lang || "").toLowerCase().startsWith(wantedLang.toLowerCase()))
      .sort((a,b)=> (a.name > b.name ? 1 : -1));

    // if no exact, show all English voices
    const fallback = voices
      .filter(v => (v.lang || "").toLowerCase().startsWith("en"))
      .sort((a,b)=> (a.name > b.name ? 1 : -1));

    const list = matched.length ? matched : fallback;

    list.forEach(v=>{
      const opt = document.createElement("option");
      opt.value = v.name;
      opt.textContent = `${v.name} (${v.lang})${v.default ? " • default" : ""}`;
      voiceSel.appendChild(opt);
    });

    if(list.length === 0){
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "（未检测到可用语音）";
      voiceSel.appendChild(opt);
    }
  }

  function stop(){
    if(!hasSpeech()) return;
    speechSynthesis.cancel();
  }

  function pickVoice(){
    const wantedLang = langSel.value.toLowerCase();
    const selectedName = voiceSel.value;
    const voices = speechSynthesis.getVoices();

    if(selectedName){
      return voices.find(v => v.name === selectedName) || null;
    }

    // auto: default voice for the language, else first match
    const exact = voices.filter(v => (v.lang||"").toLowerCase().startsWith(wantedLang));
    const def = exact.find(v => v.default) || exact[0];
    if(def) return def;

    const en = voices.filter(v => (v.lang||"").toLowerCase().startsWith("en"));
    return en.find(v=>v.default) || en[0] || null;
  }

  function speak(text){
    if(!hasSpeech()){
      alert("当前浏览器不支持 Web Speech API，建议使用 Chrome / Edge。");
      return;
    }
    stop(); // cancel current

    const u = new SpeechSynthesisUtterance(text);
    u.lang = langSel.value;
    u.rate = Number(rate.value);
    u.pitch = Number(pitch.value);

    const v = pickVoice();
    if(v) u.voice = v;

    speechSynthesis.speak(u);
  }

  async function speakAll(list){
    if(!hasSpeech()){
      alert("当前浏览器不支持 Web Speech API，建议使用 Chrome / Edge。");
      return;
    }
    stop();

    // 顺序朗读：用队列 + onend 串起来
    const items = list.map(x => x.en);
    let idx = 0;

    const next = () => {
      if(idx >= items.length) return;
      const u = new SpeechSynthesisUtterance(items[idx]);
      u.lang = langSel.value;
      u.rate = Number(rate.value);
      u.pitch = Number(pitch.value);
      const v = pickVoice();
      if(v) u.voice = v;
      u.onend = () => { idx++; next(); };
      u.onerror = () => { idx++; next(); };
      speechSynthesis.speak(u);
    };
    next();
  }

  // events
  document.addEventListener("click", (e)=>{
    const btn = e.target.closest("button[data-speak]");
    if(!btn) return;
    speak(btn.getAttribute("data-speak"));
  });

  document.getElementById("stop").addEventListener("click", stop);

  document.getElementById("speakPlanets").addEventListener("click", ()=>speakAll(planetsData));
  document.getElementById("speakCountries").addEventListener("click", ()=>speakAll(countriesData));

  langSel.addEventListener("change", ()=>{ listVoices(); });
  voiceSel.addEventListener("change", ()=>{} );

  rate.addEventListener("input", ()=> ratev.textContent = Number(rate.value).toFixed(2));
  pitch.addEventListener("input", ()=> pitchv.textContent = Number(pitch.value).toFixed(2));

  // init
  render();
  updateAPIStatus();

  // voices are often loaded async
  if(hasSpeech()){
    listVoices();
    window.speechSynthesis.onvoiceschanged = () => listVoices();
  }
</script>
</body>
</html>
